claims:
  - claim_id: claim.research.fallenness_ai_safety.auditability_is_theological_realism
    subject: doctrine.sin
    predicate: requires
    object: application.ai_governance.auditability
    claim_text: >-
      Because humans and institutions are vulnerable to distortion, AI-assisted
      workflows should preserve audit trails and review paths rather than hiding
      responsibility behind process or automation.
    epistemic_status: proposed
    confidence: high
    trust_zone: incoming_research
    source_basis:
      existing_repo_refs:
        - examples/anthropology-to-ai-governance-derivation.md
        - docs/governance/exceptions-lake-architecture-decision.md
      review_needed:
        - doctrine_sin_source_review
        - governance_policy_mapping

  - claim_id: claim.research.fallenness_ai_safety.exceptions_are_moral_signals
    subject: exceptions_lake
    predicate: may_surface
    object: application.ai_governance.category_drift_or_hidden_harm
    claim_text: >-
      Recurring exceptions may be operational signals, but they may also be moral
      signals that a system is misclassifying persons, hiding harm, or letting
      categories harden into judgments.
    epistemic_status: proposed
    confidence: medium_high
    trust_zone: incoming_research

  - claim_id: claim.research.fallenness_ai_safety.no_silent_auto_promotion
    subject: ai_generated_or_inferred_material
    predicate: must_not
    object: silently_promote_to_canonical_truth
    claim_text: >-
      AI-generated outputs, inferred graph relations, and exception patterns may
      inform proposals, but they must not silently rewrite doctrine, governance,
      or canonical source material.
    epistemic_status: proposed
    confidence: high
    trust_zone: incoming_research

implementation_candidates:
