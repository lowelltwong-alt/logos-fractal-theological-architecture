visible_advantage:
  - The topic remains stable while multiple views and judgments are linked explicitly.
  - Assessments are attached to views under a scoped baseline rather than hidden in the topic identity.
  - The network can now be read both as a doctrine file set and as a graph of governed relationships.
next_expansion:
  - Add additional contrast and dependency relations between Trinity views.
  - Reuse the same manifest pattern for the next doctrine pilot.
  - Introduce coherence and tension rules in the next phase.
