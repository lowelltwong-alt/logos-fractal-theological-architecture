    - doctrine_view.trinity.latin_filioque
    - doctrine_view.trinity.eastern_monarchy_of_the_father
    - doctrine_view.trinity.arian
  assessments:
    - doctrine_assessment.trinity.nicene_core.project_christian_core
    - doctrine_assessment.trinity.arian.project_christian_core
relationship_object_ids:
  topic_to_view:
    - relationship_object.trinity_topic.has_view.nicene_core
    - relationship_object.trinity_topic.has_view.latin_filioque
    - relationship_object.trinity_topic.has_view.eastern_monarchy_of_the_father
    - relationship_object.trinity_topic.has_view.arian
  view_to_assessment:
