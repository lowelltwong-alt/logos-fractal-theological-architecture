visible_advantage:
  - The Trinity topic remains a stable identity while multiple views coexist.
  - Arianism is represented as a view but rejected at the assessment layer under the project baseline.
  - Scriptural grounding and inter-view relations are explicit relationship objects, not hidden assumptions.
next_expansion:
  - Add grounding relationships for the remaining Trinity views.
  - Add baseline-specific assessments for Latin filioque and Eastern monarchy of the Father in this manifest.
  - Reuse this manifest pattern for the next pilot doctrine topic.
