name: PR Description Governance Checks

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  pr_description_requirements:
    name: PR description requirements
    runs-on: ubuntu-latest
    steps:
      - name: Validate required PR sections
        uses: actions/github-script@v7
        with:
          script: |
            const body = (context.payload.pull_request.body || '').trim();

            const requiredSections = [
              '### Invariant impact statement (required)',
              '### Trust zone declaration (required)',
              '### Provenance note update (required)',
              '## Drift check (required)',
              '### Old rule preserved',
              '### Intentional change',
              '### Unchanged surface'
            ];

            const missingSections = requiredSections.filter((heading) => !body.includes(heading));

            function getSectionContent(markdown, heading) {
              const escaped = heading.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`${escaped}\\n([\\s\\S]*?)(?=\\n## |\\n### |$)`, 'm');
              const match = markdown.match(re);
              if (!match) return '';
              return match[1]
                .replace(/- \[ \].*/g, '')
                .replace(/- \[x\].*/gi, '')
                .trim();
            }

            const requiredContentSections = [
              '### Invariant impact statement (required)',
              '### Trust zone declaration (required)',
              '### Provenance note update (required)',
              '### Old rule preserved',
              '### Intentional change',
              '### Unchanged surface'
            ];

            const emptySections = requiredContentSections.filter((heading) => {
              const content = getSectionContent(body, heading);
              return content.length === 0;
            });

            if (missingSections.length || emptySections.length) {
              const details = [];
              if (missingSections.length) {
                details.push(`Missing headings:\n- ${missingSections.join('\n- ')}`);
              }
              if (emptySections.length) {
                details.push(`Sections missing content:\n- ${emptySections.join('\n- ')}`);
              }
              core.setFailed(`PR description is missing required governance content.\n\n${details.join('\n\n')}`);
            }
