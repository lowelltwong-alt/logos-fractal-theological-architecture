corpus_id: benchmark-question-corpus-v1
title: Benchmark Question Corpus
status: active
purpose: Initial regression suite for evaluating whether ontology, dependency, profile, and routing changes improve or degrade answer quality across major theological routes.
scoring_dimensions:
- text_grounding
- scope_correctness
- distinction_handling
- tradition_fairness
- theological_coherence
- pastoral_tone
- citation_provenance_discipline
- uncertainty_honesty
routes:
- id: exegetical
  description: Passage handling, lexical sensitivity, context, intertext, and ambiguity restraint.
- id: dogmatic
  description: Doctrinal precision, dependency awareness, and tradition-scoped comparison.
- id: historical_theology
  description: Diachronic development, source placement, and non-anachronistic comparison.
- id: pastoral_theology
  description: Doctrine-to-care translation, wisdom under ambiguity, and non-mechanical application.
- id: ethics_public_theology
  description: Public-square reasoning, prudence, sacred values, and tradition-aware application.
question_count: 40
questions:
- id: exe-001
  route: exegetical
  question: What does “faith” mean in Romans 3:28, and does the verse teach faith as trust, faithfulness, or both?
