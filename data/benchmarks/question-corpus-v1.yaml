  - scripture:romans-3-28
  - concept:pistis
  - canon-thinker:paul
  expected_answer_mode: uncertain/disputed
  difficulty: medium
  requires_scope: false
  key_dependencies:
  - doctrine:justification
  - concept:faith
  - canon-thinker:paul
  - scripture:romans
  evaluation_targets:
  - lexical nuance
  - pauline context
  - ambiguity handling
  - restraint with contested lexical claims
  failure_modes:
  - imports later dogmatics too early
  - treats one lexical option as uncontested
  tags:
  - lexical-risk
  - requires-disagreement-handling
  - downstream-heavy
